run:
  run_name: qwen3_tts_reference_300_vllm_omni
  seed: 66

server:
  executable: vllm-omni
  model_id: Qwen/Qwen3-TTS-12Hz-1.7B-Base
  omni: true
  api_base: http://127.0.0.1:8091
  host: 0.0.0.0
  port: 8091
  gpu_memory_utilization: 0.90
  tensor_parallel_size: 1
  max_num_seqs: 8
  max_model_len: null
  trust_remote_code: true
  stage_configs_path: qwen3_tts.yaml
  allowed_local_media_path: /workspace/qwen3_tts_vllm_benchmark/data/reference/Audio/reference/reference
  extra_vllm_args: []

tts:
  endpoint: /v1/audio/speech
  task_type: Base
  payload_mode: qwen3_tts_base
  request_mode: json_with_path
  response_format: wav
  sample_rate: 24000
  stream: false
  language: Korean
  voice: null
  instructions: null

manifest:
  path: /workspace/qwen3_tts_vllm_benchmark/data/reference/manifest/reference_manifest.csv
  audio_root: /workspace/qwen3_tts_vllm_benchmark/data/reference/Audio/reference/reference
  path_prefix_from: /content/drive/MyDrive/Colab Notebooks/Data/Qwen3-TTS_DATA/Audio/reference
  path_prefix_to: /workspace/qwen3_tts_vllm_benchmark/data/reference/Audio/reference/reference

benchmark:
  warmup_requests: 5
  concurrency: [1, 2, 4]
  batch_size: 1
  request_rate: inf
  timeout_sec: 300
  save_audio: true
  metrics_sample_interval_sec: 0.2
  repeat_per_sample: 1
